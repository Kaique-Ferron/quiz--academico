<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Quiz - Cadastro</title>
  <link rel="stylesheet" href="/css/cadastro.css">
</head>
<body>

  
<div class="card">
  <h2>SIGN UP</h2>

  <form>
    <div class="input-box">
      <input id="nome" type="text" placeholder="Nome completo">
    </div>

    <div class="input-box">
      <input id="email" type="email" placeholder="Email">
    </div>

    <div class="input-box">
      <input id="senha" type="password" placeholder="Senha">
    </div>

    <div class="input-box">
      <input id="confirmarSenha" type="password" placeholder="Confirmar senha">
    </div>

    <button type="button" id="cadastroBtn" class="btn">Cadastrar</button>

    <p class="divider">ou continue com</p>

    <div class="social">
      <button type="button" class="btn" id="botaoVoltarLogin">← Voltar ao login</button>
    </div>
  </form>
</div>

<script type="module" src="./../services/auth.js"></script>

  <script>
    const botao =
    document.getElementById("botaoVoltarLogin");

    botao.addEventListener("click", () => {
        window.location.href = "/views/login.html"
    });

</script>

</body>
</html>
